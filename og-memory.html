<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1200px;height:630px}
body{background:#FBFAF7;color:#0E0E0E;font-family:'Instrument Sans',system-ui,sans-serif;
  padding:56px 64px;display:flex;flex-direction:column;justify-content:space-between}
.top{display:flex;justify-content:space-between;align-items:baseline;
  border-bottom:2px solid #0E0E0E;padding-bottom:20px}
.name{font-weight:600;font-size:22px;letter-spacing:.24em;text-transform:uppercase}
.role{font-size:18px;letter-spacing:.16em;text-transform:uppercase;color:#1B34E0;font-weight:600}
.mid{margin:6px 0}
h1{font-family:'Instrument Serif';font-weight:400;font-size:76px;line-height:.98;letter-spacing:-.01em;max-width:18ch}
h1 .it{font-style:italic}
.by{margin-top:22px;font-family:'Instrument Serif';font-style:italic;font-size:29px;color:#3a3a3a;max-width:36ch}
.bottom{display:flex;justify-content:space-between;align-items:baseline;
  border-top:2px solid #0E0E0E;padding-top:20px;font-size:20px;color:#4a4a4a}
.nums{font-family:'Instrument Serif';font-size:26px;color:#1B34E0;letter-spacing:.04em}
.bottom .url{color:#0E0E0E;font-weight:600}
</style>
</head>
<body>
  <div class="top">
    <span class="name">ARABA</span>
    <span class="role">Free tool</span>
  </div>
  <div class="mid">
    <h1>Your AI keeps getting your company <span class="it">wrong</span>.</h1>
    <p class="by">The Memory Audit: see where your knowledge lives, and where it quietly disappears.</p>
  </div>
  <div class="bottom">
    <span class="nums">5 min &middot; 12 questions &middot; 1 score</span>
    <span class="url">olurabian.com/memory-audit</span>
  </div>
</body>
</html>
