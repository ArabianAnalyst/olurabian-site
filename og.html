<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet"/>
<style>
  :root{--accent:#5B8CFF;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1200px;height:630px;background:#09090B;overflow:hidden;}
  .card{position:relative;width:1200px;height:630px;padding:80px 84px;
    display:flex;flex-direction:column;justify-content:center;
    font-family:'Geist',sans-serif;color:#ECECEE;}
  .bar{position:absolute;top:0;left:0;right:0;height:7px;background:var(--accent);}
  .glow{position:absolute;top:-200px;right:-160px;width:620px;height:620px;
    background:radial-gradient(circle,rgba(91,140,255,0.16) 0%,transparent 62%);}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:0.26em;
    text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:34px;}
  h1{font-weight:800;font-size:74px;line-height:1.02;letter-spacing:-0.035em;max-width:17ch;}
  h1 .hl{color:var(--accent);}
  .foot{position:absolute;left:84px;right:84px;bottom:64px;display:flex;
    align-items:center;justify-content:space-between;
    font-family:'JetBrains Mono',monospace;font-size:26px;color:rgba(236,236,238,0.6);}
  .foot .name{color:#ECECEE;font-weight:600;}
  .foot .url{color:var(--accent);font-weight:600;}
</style></head>
<body>
  <div class="card">
    <div class="bar"></div><div class="glow"></div>
    <div class="eyebrow">▸ AI + PAYMENTS</div>
    <h1>I build the controls that let enterprises <span class="hl">trust AI agents.</span></h1>
    <div class="foot"><span class="name">Oluwasegun Araba</span><span class="url">olurabian.com</span></div>
  </div>
</body></html>
