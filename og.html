<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1200px;height:630px}
body{background:#FBFAF7;color:#0E0E0E;font-family:'Instrument Sans',system-ui,sans-serif;
  padding:60px 64px;display:flex;flex-direction:column;justify-content:space-between}
.top{display:flex;justify-content:space-between;align-items:baseline;
  border-bottom:2px solid #0E0E0E;padding-bottom:22px}
.name{font-weight:600;font-size:22px;letter-spacing:.24em;text-transform:uppercase}
.role{font-size:18px;letter-spacing:.16em;text-transform:uppercase;color:#1B34E0;font-weight:600}
h1{font-family:'Instrument Serif';font-weight:400;font-size:104px;line-height:.92;letter-spacing:-.01em;max-width:15ch}
h1 .it{font-style:italic}
.bottom{display:flex;justify-content:space-between;align-items:baseline;
  border-top:2px solid #0E0E0E;padding-top:22px;font-size:20px;color:#4a4a4a}
.bottom .k{color:#0E0E0E;font-weight:600}
</style>
</head>
<body>
  <div class="top">
    <span class="name">ARABA</span>
    <span class="role">Forward Deployed Founder</span>
  </div>
  <h1>Build the infrastructure. <span class="it">Own the category.</span></h1>
  <div class="bottom">
    <span><span class="k">invobi</span> &middot; <span class="k">Purse</span> &middot; <span class="k">Company Brain</span></span>
    <span>olurabian.com</span>
  </div>
</body>
</html>
